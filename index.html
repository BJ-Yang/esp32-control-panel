<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 雲端控制面板</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f7f6;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 80%;
            max-width: 400px;
        }

        h2 { color: #333; margin-bottom: 1.5rem; }

        /* 狀態顯示區 */
        .status-box {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 2rem;
            padding: 15px;
            border-radius: 15px;
            background: #fafafa;
        }

        /* 圓形燈號視覺 */
        #led-indicator {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background-color: #bbb;
            transition: all 0.3s ease;
        }

        /* 燈號顏色狀態 */
        .led-on {
            background-color: #2ecc71 !important;
            box-shadow: 0 0 15px #2ecc71;
        }
        .led-off {
            background-color: #e74c3c !important;
            box-shadow: 0 0 15px #e74c3c;
        }

        #led-text { font-weight: bold; font-size: 1.2rem; }

        /* 按鈕樣式 */
        .btn-group { display: flex; flex-direction: column; gap: 15px; }
        
        button {
            padding: 15px 25px;
            font-size: 1rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.1s;
            color: white;
            font-weight: bold;
        }

        button:active { transform: scale(0.95); }

        .btn-on { background-color: #2ecc71; }
        .btn-off { background-color: #e74c3c; }

        .footer { margin-top: 20px; font-size: 0.8rem; color: #888; }
    </style>
</head>
<body>

    <div class="card">
        <h2>遠端控燈系統</h2>

        <div class="status-box">
            <div id="led-indicator"></div>
            <span id="led-text">讀取中...</span>
        </div>

        <div class="btn-group">
            <button class="btn-on" onclick="sendControl(true)">點亮 LED (ON)</button>
            <button class="btn-off" onclick="sendControl(false)">關閉 LED (OFF)</button>
        </div>

        <div class="footer">
            最後更新: <span id="time-text">-</span>
        </div>
    </div>

    <script>
        // 請務必更新這行 Ngrok 網址
        // const API_URL = "http://192.168.41.135:3000/rules/1";
        const API_URL = "https://resale-essence-mustiness.ngrok-free.dev/rules/1";

        // 更新網頁視覺狀態
        function updateUI(status, time) {
            const textEl = document.getElementById('led-text');
            const indicatorEl = document.getElementById('led-indicator');
            const timeEl = document.getElementById('time-text');

            if (status) {
                textEl.innerText = "燈號：亮起";
                textEl.style.color = "#2ecc71";
                indicatorEl.className = "led-on";
            } else {
                textEl.innerText = "燈號：熄滅";
                textEl.style.color = "#e74c3c";
                indicatorEl.className = "led-off";
            }
            if (time) timeEl.innerText = time;
        }

        // 發送指令給中繼站 (PATCH)
        function sendControl(status) {
            const now = new Date().toLocaleString();
            
            fetch(API_URL, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    ledStatus: status,
                    lastUpdate: now
                })
            })
            .then(res => {
                if (res.ok) {
                    console.log("伺服器已更新狀態為:", status);
                    updateUI(status, now);
                } else {
                    alert("發送失敗，請檢查 Ngrok 是否開啟");
                }
            })
            .catch(err => {
                console.error("錯誤:", err);
                alert("連線錯誤，請確認網址是否正確");
            });
        }

        // 初始載入：從資料庫讀取目前狀態
        window.onload = () => {
            fetch(API_URL)
            .then(res => res.json())
            .then(data => {
                updateUI(data.ledStatus, data.lastUpdate);
            })
            .catch(err => console.error("無法取得初始狀態:", err));
        };
    </script>
</body>
</html>
