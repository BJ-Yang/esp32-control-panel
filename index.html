<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <title>ESP32 IoT 學生實作面板</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding-top: 50px; background-color: #f4f4f9; color: #333; }
        .container { max-width: 400px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { font-size: 24px; margin-bottom: 30px; }
        
        /* 按鈕樣式 */
        button { font-size: 18px; padding: 15px 30px; margin: 10px; cursor: pointer; border-radius: 50px; border: none; transition: 0.3s; width: 80%; font-weight: bold; }
        button:active { transform: scale(0.95); }
        .on-btn { background-color: #4CAF50; color: white; box-shadow: 0 4px #2e7d32; }
        .off-btn { background-color: #f44336; color: white; box-shadow: 0 4px #c62828; }
        
        /* 狀態顯示區 */
        .status-card { margin-top: 30px; padding: 15px; border-top: 1px solid #eee; }
        #statusIndicator { font-size: 20px; font-weight: bold; margin: 10px 0; }
        #updateTime { font-size: 12px; color: #999; }
    </style>
</head>
<body>

    <div class="container">
        <h1>物聯網控制台</h1>
        <p>請修改下方 API 網址為你的座號</p>
        
        <button class="on-btn" onclick="sendControl(true)">點亮 LED (ON)</button>
        <button class="off-btn" onclick="sendControl(false)">熄滅 LED (OFF)</button>

        <div class="status-card">
            <div id="statusIndicator">⏳ 正在同步狀態...</div>
            <div id="updateTime">最後同步：--:--:--</div>
        </div>
    </div>

    <script>
        /**
         * 📝 學生練習重點：
         * 1. 請更換下方的 Ngrok 網址
         * 2. 網址最後面的數字請改成你的「座號」
         */
        const API_URL = "https://resale-essence-mustiness.ngrok-free.dev/rules/1";

        // --- 功能 A: 定時抓取雲端狀態 (GET) ---
        function getStatus() {
            fetch(API_URL, {
                method: "GET",
                headers: {
                    "ngrok-skip-browser-warning": "true", // 避開 Ngrok 警告頁面
                    "Accept": "application/json"
                }
            })
            .then(res => {
                if (!res.ok) throw new Error("網路連線異常");
                return res.json();
            })
            .then(data => {
                const indicator = document.getElementById('statusIndicator');
                const timeBox = document.getElementById('updateTime');
                
                // 因為我們抓的是 /rules/座號，所以 data 直接就是物件，不用加 [0]
                if (data.ledStatus === true) {
                    indicator.innerHTML = '<span style="color: #4CAF50;">🟢 目前狀態：點亮中</span>';
                } else {
                    indicator.innerHTML = '<span style="color: #f44336;">🔴 目前狀態：熄滅中</span>';
                }
                
                timeBox.innerText = "雲端最後更新：" + (data.lastUpdate || "尚未有紀錄");
            })
            .catch(err => {
                document.getElementById('statusIndicator').innerHTML = '<span style="color: grey;">⚠️ 連線失敗</span>';
                console.error("錯誤:", err);
            });
        }

        // --- 功能 B: 發送控制指令 (PATCH) ---
        function sendControl(status) {
            const now = new Date().toLocaleString(); 

            fetch(API_URL, {
                method: 'PATCH',
                headers: { 
                    'Content-Type': 'application/json',
                    'ngrok-skip-browser-warning': 'true'
                },
                body: JSON.stringify({ 
                    ledStatus: status,
                    lastUpdate: now
                })
            })
            .then(res => {
                if (!res.ok) throw new Error("發送失敗");
                return res.json();
            })
            .then(data => {
                console.log("成功更新資料:", data);
                // 按下按鈕後「立刻」執行一次抓取，讓介面秒更新
                getStatus(); 
            })
            .catch(err => {
                alert("操作失敗，請確認老師提供的 API 網址是否正確。");
            });
        }

        /**
         * 💡 為了避免 25 人同時連線造成伺服器緩慢，
         * 我們將自動同步時間設為 10 秒 (10000 毫秒)。
         */
        setInterval(getStatus, 2000); 

        // 網頁開啟時立刻執行第一次
        getStatus();
    </script>
</body>
</html>
