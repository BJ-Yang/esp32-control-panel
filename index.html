<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <title>ESP32 IoT 控制面板</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding-top: 50px; background-color: #f4f4f9; color: #333; }
        .container { max-width: 400px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { font-size: 24px; margin-bottom: 30px; }
        
        /* 按鈕樣式 */
        button { font-size: 18px; padding: 15px 30px; margin: 10px; cursor: pointer; border-radius: 50px; border: none; transition: 0.3s; width: 80%; font-weight: bold; }
        button:active { transform: scale(0.95); }
        .on-btn { background-color: #4CAF50; color: white; box-shadow: 0 4px #2e7d32; }
        .off-btn { background-color: #f44336; color: white; box-shadow: 0 4px #c62828; }
        
        /* 狀態顯示區 */
        .status-card { margin-top: 30px; padding: 15px; border-top: 1px solid #eee; }
        #statusIndicator { font-size: 20px; font-weight: bold; margin: 10px 0; }
        #updateTime { font-size: 12px; color: #999; }
    </style>
</head>
<body>

    <div class="container">
        <h1>ESP32-C3 雲端控制</h1>
        
        <button class="on-btn" onclick="sendControl(true)">點亮 LED (ON)</button>
        <button class="off-btn" onclick="sendControl(false)">熄滅 LED (OFF)</button>

        <div class="status-card">
            <div id="statusIndicator">⏳ 正在同步雲端狀態...</div>
            <div id="updateTime">最後同步：--:--:--</div>
        </div>
    </div>

    <script>
        /**
         * ⚠️ 注意：每次重啟 Ngrok，請務必更換下方的網址
         * 且確保結尾有 /rules/1
         */
        const API_URL = "https://resale-essence-mustiness.ngrok-free.dev/rules/1";

        // --- 功能 A: 定時抓取雲端狀態 (GET) ---
        function getStatus() {
            fetch(API_URL, {
                method: "GET",
                headers: {
                    // ⭐ 關鍵：這個標頭能繞過 ngrok 的瀏覽器警告頁面，解決 CORS 問題
                    "ngrok-skip-browser-warning": "true",
                    "Accept": "application/json"
                }
            })
            .then(res => {
                if (!res.ok) throw new Error("網路連線異常");
                return res.json();
            })
            .then(data => {
                const indicator = document.getElementById('statusIndicator');
                const timeBox = document.getElementById('updateTime');
                
                // 根據 JSON 資料更新介面
                if (data.ledStatus === true) {
                    indicator.innerHTML = '<span style="color: #4CAF50;">🟢 目前狀態：點亮中</span>';
                } else {
                    indicator.innerHTML = '<span style="color: #f44336;">🔴 目前狀態：熄滅中</span>';
                }
                
                timeBox.innerText = "雲端最後更新時間：" + (data.lastUpdate || "無紀錄");
            })
            .catch(err => {
                document.getElementById('statusIndicator').innerHTML = '<span style="color: grey;">⚠️ 無法連線至伺服器</span>';
                console.error("抓取失敗:", err);
            });
        }

        // --- 功能 B: 發送控制指令 (PATCH) ---
        function sendControl(status) {
            const now = new Date().toLocaleString(); 

            fetch(API_URL, {
                method: 'PATCH',
                headers: { 
                    'Content-Type': 'application/json',
                    'ngrok-skip-browser-warning': 'true' // PATCH 最好也加上，確保一致性
                },
                body: JSON.stringify({ 
                    ledStatus: status,
                    lastUpdate: now
                })
            })
            .then(res => {
                if (!res.ok) throw new Error("伺服器回應錯誤");
                return res.json();
            })
            .then(data => {
                console.log("成功發送指令:", data);
                // 成功後立刻同步一次狀態
                getStatus(); 
            })
            .catch(err => {
                console.error(err);
                alert("控制失敗！\n1. 請確認 Mac 的 json-server 是否有加 --host 0.0.0.0 啟動\n2. 請確認 Ngrok 網址是否正確");
            });
        }

        // 設定每 2 秒自動抓取一次最新狀態
        setInterval(getStatus, 2000);
        // 網頁開啟時立刻抓取一次
        getStatus();
    </script>
</body>
</html>
