<!DOCTYPE html>
<html>
<head>
    <title>ESP32 控制面板</title>
    <meta charset="utf-8">
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; }
        button { font-size: 24px; padding: 15px 40px; margin: 10px; cursor: pointer; border-radius: 8px; border: none; }
        .on { background-color: #4CAF50; color: white; }
        .off { background-color: #f44336; color: white; }
    </style>
</head>
<body>
    <h1>ESP32-C3 燈光控制</h1>
    <button class="on" onclick="sendControl(true)">點亮 LED</button>
    <button class="off" onclick="sendControl(false)">熄滅 LED</button>

    <script>
        // 注意：這裡要換成你筆電的 IP
        const API_URL = "http://192.168.41.135:3000/controls";

        function sendControl(status) {
            fetch(API_URL, {
                method: 'PATCH', // 使用 PATCH 只修改部分資料
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ledStatus: status })
            })
            .then(res => console.log("設定成功:", status))
            .catch(err => alert("連線失敗！請檢查 Server 是否執行中"));
        }
    </script>
</body>
</html>
